name: Daily Podcast

on:
  schedule:
    # Runs at 03:00 UTC every day (= 3am London winter / 11am Beijing+8)
    - cron: "0 3 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: openclaw-knowledge-radio

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for push back
          token: ${{ secrets.GH_PAT }}   # PAT with repo + workflow scopes

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Run daily pipeline
        env:
          OPENROUTER_API_KEY:   ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN:         ${{ secrets.GH_PAT }}
          SLACK_WEBHOOK_URL:    ${{ secrets.SLACK_WEBHOOK_URL }}
          NOTION_TOKEN:         ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID:   ${{ secrets.NOTION_DATABASE_ID }}
          VISITOR_MESSAGE_ENDPOINT: ${{ secrets.VISITOR_MESSAGE_ENDPOINT }}
        run: python run_daily.py

      - name: Process missed papers
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python tools/process_missed_papers.py

      - name: Prune old output dirs (keep last 30 days)
        run: |
          python - <<'PYEOF'
          import shutil, time
          from pathlib import Path
          from datetime import date, timedelta
          cutoff = date.today() - timedelta(days=30)

          # Prune old output dirs
          for d in Path("output").iterdir():
              if not d.is_dir(): continue
              try:
                  if date.fromisoformat(d.name) < cutoff:
                      shutil.rmtree(d)
                      print(f"Pruned output/{d.name}")
              except ValueError:
                  pass

          # Prune old article analysis cache (keep last 30 days by mtime)
          cache_dir = Path("data/article_analysis")
          if cache_dir.exists():
              cutoff_ts = time.time() - 30 * 86400
              pruned = 0
              for f in cache_dir.iterdir():
                  if f.is_file() and f.stat().st_mtime < cutoff_ts:
                      f.unlink()
                      pruned += 1
              if pruned:
                  print(f"Pruned {pruned} stale analysis cache file(s)")
          PYEOF

      - name: Commit and push changes
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update daily podcast site $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push origin main
