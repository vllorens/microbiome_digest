name: Sync notes to Notion

on:
  push:
    paths:
      - 'openclaw-knowledge-radio/state/paper_notes.json'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}   # PAT needed for authenticated push
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Create Notion stubs for new notes
        run: python openclaw-knowledge-radio/tools/sync_notion_notes.py
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: 31ff516be8ec806aaf20fe60adf931b0

      - name: Commit updated notion_created.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add openclaw-knowledge-radio/state/notion_created.json
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Sync notion_created.json [skip ci]"
          # Retry push up to 3 times to handle concurrent note saves
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed, retrying..."
            sleep $((i * 3))
          done
