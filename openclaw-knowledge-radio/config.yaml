pubmed:
  enabled: true
  email: "vllorens9@gmail.com"
  lookback_days: 2
  max_results_per_term: 30
  bucket: "microbiome"
  tags: ["pubmed", "journal", "biology"]
  search_terms:
    # Cat 1 — general microbiome and host-microbiome interactionterms
    - "human gut microbiota"
    - "human gut microbiome"
    - "host-microbiome interaction"
    - "host-microbiota interaction"
    - "gut microbiome disease"
    # Cat 2 — functionality and multiomics
    - "gut microbiome functionality"
    - "gut microbiota function"
    - "gut microbiome function"
    - "gut metatranscriptomics"
    - "fecal metatranscriptomics"
    - "stool metatranscriptomics"
    # Cat 3 — computational papers
    - "microbiome analysis"
    - "metatranscriptome analysis"
    - "microbiome analysis tool"
    - "microbiome analysis pipeline"
    - "benchmark microbiome"
    - "microbiome bioinformatics"
    - "multiomics microbiome"
    - "multiomic integration microbiome"
    # Cat 4 — Gut microbiome in cancer
    - "microbiome colorectal cancer"
    - "microbiome CRC"
    - "gut microbiome CRC"
    - "cancer gut microbiome"
    - "fusobacterium nucleatum cancer"
    # Cat 5 — Gut microbiome other disorders
    - "gut microbiome IBS"
    - "gut microbiome irritable bowel syndrome"
    - "gut microbiome IBD"
    # Cat 6 — Genetic engineering and microbiome modulation
    - "CRISPR gut microbiome"
    - "CRISPRi gut microbiome"
    - "genetic engineering microbiome"
    - "gut microbiome modulation"
    - "CRISPR microbiome"
    # Cat 7 — LGG
    - "lacticaseibacillus rhamnosus GG"
    - "probiotic lactobacilli"

