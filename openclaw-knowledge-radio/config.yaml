publish:
  enabled: true
  github_release_repo: "vllorens/microbiome_digest"
  cleanup_intermediate: true

llm:
  enabled: true
  provider: "openrouter"
  model: "arcee-ai/trinity-large-preview:free"
  analysis_model: "stepfun/step-3.5-flash:free"
  api_key_env: "OPENROUTER_API_KEY"
  temperature: 0.25
  max_output_tokens: 8192

ranking:
  # Papers whose titles contain any of these are treated as absolute priority
  # (same tier as tracked author feeds). Use for landmark tools / model families.
  absolute_title_keywords:
    - "gut microbiota"
    - "gut microbiome"
    - "microbiome"
    - "metatranscriptomics"
    - "multiomics"
    - "host-microbiome"

  absolute_source_substrings:
    # Original
    - "jeroen raes"
    - "nicola segata"
    - "curtis huttenhower"
    - "dan knights"
    - "peer bork"
    - "ruth ley"
    - "cynthia sears"
    - "jennifer wargo"
    - "susan bullman"
    - "jeffrey gordon"
    - "georg zeller"
  

  source_priority_rules:
    # Priority 1 - Absolute essentials: top-tier journals, core to the field
    - {contains: "Cell Host & Microbe", priority: 1}
    - {contains: "Nature Microbiology", priority: 1}
    - {contains: "Nature Biotechnology", priority: 1}
    - {contains: "Nature Medicine", priority: 1}
    - {contains: "Nature Methods", priority: 1}
    - {contains: "Cell", priority: 1}
    - {contains: "Science", priority: 1}
    - {contains: "Gut (BMJ)", priority: 1}
    - {contains: "Microbiome (BioMed Central)", priority: 1}
    - {contains: "bioRxiv - Microbiology", priority: 1}
    - {contains: "bioRxiv - Genomics", priority: 1}

    # Priority 2 - High-impact, broad journals with strong microbiome content
    - {contains: "Nature - Microbiome Topic", priority: 2}
    - {contains: "Nature Communications", priority: 2}
    - {contains: "PNAS", priority: 2}
    - {contains: "ISME Journal", priority: 2}
    - {contains: "Gastroenterology", priority: 2}
    - {contains: "medRxiv - Gastroenterology", priority: 2}
    - {contains: "medRxiv - Oncology", priority: 2}

    # Priority 3 - Strong field-specific journals
    - {contains: "eLife - Microbiology", priority: 3}
    - {contains: "mBio", priority: 3}
    - {contains: "mSystems", priority: 3}
    - {contains: "Gut Microbes", priority: 3}
    - {contains: "npj Biofilms and Microbiomes", priority: 3}
    - {contains: "Nucleic Acids Research", priority: 3}
    - {contains: "Journal of the National Cancer Institute", priority: 3}
    - {contains: "bioRxiv - Bioinformatics", priority: 3}
    - {contains: "bioRxiv - Synthetic Biology", priority: 3}

    # Priority 4 - Good journals, more specialized or slightly lower impact
    - {contains: "ACS Synthetic Biology", priority: 4}
    - {contains: "Bioinformatics (OUP)", priority: 4}
    - {contains: "Briefings in Bioinformatics", priority: 4}
    - {contains: "Genome Research", priority: 4}
    - {contains: "ISME Communications", priority: 4}
    - {contains: "Journal of Crohn's and Colitis", priority: 4}
    - {contains: "Nature Protocols", priority: 4}
    - {contains: "STAR Protocols (Cell)", priority: 4}

    # Priority 5 - Useful but more peripheral or methodological
    - {contains: "mSphere", priority: 5}
    - {contains: "Microbiological Spectrum", priority: 5}
    - {contains: "PLOS Computational Biology", priority: 5}
    - {contains: "Alimentary Pharmacology & Therapeutics", priority: 5}

    # Priority 6 - Lower signal-to-noise for this specific use case
    - {contains: "Gigascience", priority: 6}

    # Priority 7 - Broad/noisy, rely heavily on keyword filtering
    - {contains: "Gigascience", priority: 7}

    # Items whose title or snippet contain any of these keywords are ranked
    # above other items of equal source quality.
  
  topic_boost_keywords:
      # Cat 1 — general/computational
      - "metatranscriptomics"
      - "multi-omics microbiome"
      - "multiomics microbiome"
      - "multiomics microbiota"
      - "multi-omics microbiota"
      - "gut metatranscriptomics"
      - "low biomass microbiome"
      - "computational pipeline"
      # Cat 2 - CRC or IBS
      - "CRC microbiome"
      - "colorectal cancer microbiome"
      - "IBS microbiome"
      - "irritable bowel syndrome"
      # Cat 3 - specific bacteria
      - "brachyspira"
      - "fusobacterium nucleatum"
      - "lacticaseibacillus rhamnosus"
      - "lactobacillus rhamnosus"
      # Cat 4 — CRISPR - synthetic biology
      - "CRISPR"
      - "CRISPRi"
      - "synthetic biology"
      - "genetic engineering microbiomme"
    