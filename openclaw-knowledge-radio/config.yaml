timezone: "Europe/London"
lookback_hours: 24

paths:
  data_dir: "data"
  output_dir: "output"
  state_dir: "state"

limits:
  max_items_total: 40
  max_items_microbiome: 30
  max_items_clinical: 5

excluded_terms:
  # off-topic: non-rodent animal microbiomes
  - "canine"
  - "equine"
  - "ruminant"
  - "rumen"
  - "ruminal"
  - "broiler"
  - "poultry"
  - "chicken meat"
  - "chickens"
  - "honeybee"
  - "honey bee"
  - "avian"
  - "tadpole"
  - "amphibian"
  - "marsupial"
  - "mastitis"
  - "veterinary"
  - "mosquito"
  - "bird"
  - "oyster"
  - "worm"
  - "fish"
  # off-topic: plant microbiomes
  - "plant microbiome"
  - "crop microbiome"
  - "rhizosphere"
  - "phyllosphere"
  - "leaf microbiome"
  - "plant colonization"
  - "plant-microbe"
  - "crop"
  # off-topic: environmental microbiomes
  - "environmental microbiome"
  - "ocean microbiome"
  - "soil microbiome"
  - "pig microbiome"
  - "insect microbiome"
  - "estuarine"
  - "coral"
  - "diatom"
  - "subterranean"
  - "cave microbiome"
  - "aquatic environment"
  - "phycosphere"
  - "ocean"
  - "marine"
  - "coastal"
  - "soil"
  # journals to exclude
  - "Pest management science"
  # Administrative / non-research
  - "author correction"
  - "in this issue"
  - "retraction notice"
  - "news & views"
  - "news and views"
  - "cover"
  - "editorial board"
  - "table of contents"
  - "elsewhere in the aga journals"

# Items must match at least one of these terms (checked against title + abstract).
# Applies to all sources. Leave empty ([]) to disable.
required_terms:
  - "microbiome"
  - "microbiota"
  - "gut microbes"
  - "gut bacteria"
  - "gut microbial"
  - "intestinal microbi"
  - "microbial community"
  - "microbial ecology"
  - "microbial diversity"
  - "host-microbe"
  - "host-microbial"
  - "dysbiosis"
  - "probiotic"
  - "prebiotic"
  - "fecal microbiota"
  - "fecal transplant"
  - "16s"
  - "metagenom"
  - "metatranscriptom"
  - "metaproteom"

